<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YE Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-logo">YE VAULT</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="u" onclick="switchTab('u','Songs')">Unreleased</button>
    <button class="nav-tab" data-tab="r" onclick="switchTab('r','Songs')">Released</button>
    <button class="nav-tab" data-tab="a" onclick="switchTab('a','Links')">Album Copies</button>
  </div>
  <div class="nav-actions">
    <a class="nav-shop" href="https://shop.yevault.com" target="_blank" rel="noopener noreferrer">shop</a>
    <a class="nav-kofi" href="https://ko-fi.com/yevault" target="_blank" rel="noopener noreferrer">♥ support</a>
  </div>
  <div class="nav-stats">
    <div class="nav-stat"><span id="nav-eras">—</span> eras</div>
    <div class="nav-stat"><span id="nav-songs">—</span> songs</div>
  </div>
</nav>

<div class="hero">
  <div id="hero-bg"></div>
  <div class="hero-title">YE VAULT</div>
  <div class="hero-sub">a collection of Ye's full discography</div>
</div>

<div class="search-wrap">
  <input id="search-box" class="search-box" type="text" placeholder="search songs or eras... (press / to focus)" oninput="onSearch(this.value)" autocomplete="off" spellcheck="false">
</div>

<div class="era-list" id="era-list"></div>

<div class="kofi-section">
  <div class="kofi-text">enjoy the vault? support the project</div>
  <a class="kofi-btn" href="https://ko-fi.com/yevault" target="_blank" rel="noopener noreferrer">
    <span class="kofi-heart">♥</span> support on ko-fi
  </a>
</div>

<footer class="footer">
  <div class="footer-version">YE VAULT v3.2.0</div>
  <div class="footer-credits">a fan-made archive &nbsp;·&nbsp; not affiliated with Ye or any label</div>
</footer>

<button class="scroll-top" id="scroll-top" onclick="goToTop()" title="Back to top">
  <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="18,15 12,9 6,15"/></svg>
</button>

<div class="shop-popup" id="shop-popup">
  <div class="shop-popup-header">
    <div class="shop-popup-title">YE VAULT</div>
    <button class="shop-popup-close" onclick="document.getElementById('shop-popup').classList.add('hidden')">✕</button>
  </div>
  <div class="shop-popup-msg">The YE Vault shop is now open</div>
  <a class="shop-popup-btn" href="https://shop.yevault.com" target="_blank" rel="noopener noreferrer">visit the shop →</a>
</div>

<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
