<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YE Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="hero">
  <div id="hero-bg"></div>
  <div class="hero-ye">YE</div>
  <div class="hero-sub" id="hero-sub">THE COMPLETE ARCHIVE</div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-val" id="s-eras">—</div><div class="stat-lbl">Eras</div></div>
  <div class="stat"><div class="stat-val" id="s-songs">—</div><div class="stat-lbl">Songs</div></div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" data-tab="u" onclick="switchTab('u','Songs')">Unreleased</button>
  <button class="tab-btn" data-tab="r" onclick="switchTab('r','Songs')">Released</button>
  <button class="tab-btn" data-tab="a" onclick="switchTab('a','Links')">Album Copies</button>
</div>
<div class="era-list" id="era-list"></div>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
